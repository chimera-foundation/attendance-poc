<!DOCTYPE html>

    .icon-container svg {
      width: 40px;
      height: 40px;
    }
    h2 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 8px 0;
    }
    p {
      font-size: 14px;
      color: #5c5f61;
